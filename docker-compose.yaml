services :

  redis :
    image : redis:7-alpine
    container_name : redis
    ports :
      - "6379:6379"
    command : ["redis-server", "--appendonly", "yes"] 
    volumes :
      - redis_data:/data

  mongo :
    image : mongo:7
    container_name : mongodb
    ports :
      - "27018:27017"
    volumes :
      - mongo_data:/data/db 
    environment :
      MONGO_INITDB_DATABASE : mydatabase

volumes:
  redis_data :
  mongo_data :